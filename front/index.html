<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Cursos</title>
  <link rel="stylesheet" href="./estilo.css">
</head>

<body>

<header>
  <h1>SISTEMA DE GESTIÓN DE CURSOS</h1>
</header>

<nav>
  <ul>
    <li><a href="#RegistroCurso">Registrar Curso</a></li>
    <li><a href="#listadoCursos">Listado de Cursos</a></li>
  </ul>
</nav>

<main>

  <section class="panel" id="RegistroCurso">

    <h2>Registrar Curso</h2>

    <form id="formCurso">

      <input
        type="text"
        id="nombre"
        placeholder="Nombre del Curso"
        required
      >

      <input
        type="text"
        id="categoria"
        placeholder="Categoría"
        required
      >

      <input
        type="number"
        id="duracion"
        placeholder="Duración (horas)"
        required
      >

      <input
        type="number"
        id="cuposDisponibles"
        placeholder="Cupos Disponibles"
        required
      >

      <select id="activo" required>
        <option value="">Estado del curso</option>
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>

      <button type="submit">
        Guardar Curso
      </button>

    </form>

    <p id="mensaje"></p>

  </section>

  <section class="panel">

    <h2>Listado de Cursos</h2>

    <div class="acciones">
      <button id="btnCargar">
        Recargar Cursos
      </button>

      <button id="btnTodos">
        Mostrar Todos
      </button>

      <button id="btnActivos">
        Activos
      </button>

      <button id="btnInactivos">
        Inactivos
      </button>
    </div>

    <div id="listadoCursos" class="galeria"></div>

  </section>

</main>

<footer>
  <p>© 2026 - Sistema de Gestión de Cursos</p>
</footer>

<script src="./app.js"></script>

</body>
</html>
